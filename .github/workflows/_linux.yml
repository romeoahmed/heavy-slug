name: Reusable Linux

# Single Ubuntu runner that pays setup once and runs every Linux-eligible
# verification: core tests, Slang -> SPIR-V compile, Vulkan backend (with the
# shader-stat variant), and the Wayland Vulkan demo build.

"on":
  workflow_call:
    inputs:
      zig_version:
        required: false
        default: from-zon
        type: string
      slang_version:
        required: false
        default: "2026.10.2"
        type: string

permissions:
  contents: read

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Zig
        id: zig
        uses: ./.github/actions/setup-zig
        with:
          version: ${{ inputs.zig_version }}

      - name: Setup Slang
        uses: ./.github/actions/setup-slang
        with:
          version: ${{ inputs.slang_version }}

      - name: Install Wayland demo packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwayland-bin libwayland-dev libxkbcommon-dev wayland-protocols

      - name: Fetch Zig dependencies
        uses: ./.github/actions/fetch-zig-deps
        with:
          build-args: test -Dvulkan=true -Ddemo=true -Ddemo-backend=vulkan

      - name: Run core tests
        run: zig build test

      - name: Compile SPIR-V shaders
        run: zig build spirv

      - name: Run Vulkan backend tests
        run: zig build test -Dvulkan=true

      - name: Run Vulkan shader-stat tests
        run: zig build test -Dvulkan=true -Dshader-stats=true

      - name: Run Vulkan demo build tests
        run: zig build test -Ddemo=true -Ddemo-backend=vulkan

      - name: Save Zig package cache
        uses: ./.github/actions/save-zig-package-cache
        with:
          cache-hit: ${{ steps.zig.outputs.package_cache_hit }}
          key: ${{ steps.zig.outputs.package_cache_key }}
          path: ${{ steps.zig.outputs.package_cache_path }}
