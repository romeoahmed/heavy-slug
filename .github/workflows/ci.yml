name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      zig_version:
        description: "Zig version: from-zon, stable/latest, master, or an explicit version."
        required: false
        default: from-zon
        type: string
      slang_version:
        description: "Slang release version or tag."
        required: false
        default: "2026.9"
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    uses: ./.github/workflows/_quality.yml
    with:
      zig_version: ${{ github.event.inputs.zig_version || 'from-zon' }}

  core:
    name: Core
    needs: quality
    uses: ./.github/workflows/_core.yml
    with:
      zig_version: ${{ github.event.inputs.zig_version || 'from-zon' }}

  shaders:
    name: Shaders
    needs: quality
    uses: ./.github/workflows/_shaders.yml
    with:
      zig_version: ${{ github.event.inputs.zig_version || 'from-zon' }}
      slang_version: ${{ github.event.inputs.slang_version || '2026.9' }}

  vulkan:
    name: Vulkan
    needs: quality
    uses: ./.github/workflows/_vulkan.yml
    with:
      zig_version: ${{ github.event.inputs.zig_version || 'from-zon' }}
      slang_version: ${{ github.event.inputs.slang_version || '2026.9' }}

  metal:
    name: Metal
    needs: quality
    uses: ./.github/workflows/_metal.yml
    with:
      zig_version: ${{ github.event.inputs.zig_version || 'from-zon' }}
      slang_version: ${{ github.event.inputs.slang_version || '2026.9' }}
