name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      zig_version:
        description: "Zig version: from-zon, stable/latest, master, or an explicit version."
        required: false
        default: from-zon
        type: string
      slang_version:
        description: "Slang release version or tag."
        required: false
        default: "2026.10.2"
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Reusable workflows are organized by runner identity rather than by concern.
# Each platform job pays checkout + Zig/Slang install + dependency fetch
# exactly once and then runs every verification that platform can host. This
# keeps macOS — the most expensive minute on GitHub-hosted CI — to a single
# runner per CI run.
jobs:
  quality:
    name: Quality
    uses: ./.github/workflows/_quality.yml
    with:
      zig_version: ${{ github.event.inputs.zig_version || 'from-zon' }}

  linux:
    name: Linux
    needs: quality
    uses: ./.github/workflows/_linux.yml
    with:
      zig_version: ${{ github.event.inputs.zig_version || 'from-zon' }}
      slang_version: ${{ github.event.inputs.slang_version || '2026.10.2' }}

  windows:
    name: Windows
    needs: quality
    uses: ./.github/workflows/_windows.yml
    with:
      zig_version: ${{ github.event.inputs.zig_version || 'from-zon' }}
      slang_version: ${{ github.event.inputs.slang_version || '2026.10.2' }}

  macos:
    name: macOS
    needs: quality
    uses: ./.github/workflows/_macos.yml
    with:
      zig_version: ${{ github.event.inputs.zig_version || 'from-zon' }}
      slang_version: ${{ github.event.inputs.slang_version || '2026.10.2' }}
