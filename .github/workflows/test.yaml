name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      zig_version:
        description: "Zig version: from-zon, stable/latest, master, or an explicit version"
        required: false
        default: "from-zon"
        type: string
      slang_version:
        description: "Slang release: latest or an explicit version/tag"
        required: false
        default: "latest"
        type: string
      run_release_build:
        description: "Run ReleaseFast build jobs"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  ZIG_VERSION: ${{ inputs.zig_version || 'from-zon' }}
  SLANG_VERSION: ${{ inputs.slang_version || 'latest' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Zig
        id: zig
        run: .github/scripts/setup-zig.sh --resolve-only

      - name: Restore Zig tool cache
        id: zig-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ steps.zig.outputs.version }}-${{ steps.zig.outputs.target }}-lint

      - name: Setup Zig
        run: .github/scripts/setup-zig.sh
        env:
          ZIG_VERSION: ${{ steps.zig.outputs.version }}
          ZIG_DOWNLOAD_URL: ${{ steps.zig.outputs.url }}

      - name: Save Zig tool cache
        if: steps.zig-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ steps.zig.outputs.version }}-${{ steps.zig.outputs.target }}-lint

      - name: Check formatting
        run: zig fmt --check build.zig src/ tools/

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu core
            cache: ubuntu-core
            os: ubuntu-latest
            command: zig build test
          - name: ubuntu vulkan
            cache: ubuntu-vulkan
            os: ubuntu-latest
            command: zig build test -Dvulkan=true
          - name: ubuntu vulkan shader stats
            cache: ubuntu-vulkan-shader-stats
            os: ubuntu-latest
            command: zig build test -Dvulkan=true -Dshader-stats=true
          - name: macos core
            cache: macos-core
            os: macos-26
            command: zig build test
          - name: macos metal
            cache: macos-metal
            os: macos-26
            command: zig build test -Dmetal=true
          - name: macos metal shader stats
            cache: macos-metal-shader-stats
            os: macos-26
            command: zig build test -Dmetal=true -Dshader-stats=true
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Zig
        id: zig
        run: .github/scripts/setup-zig.sh --resolve-only

      - name: Resolve Slang
        id: slang
        run: .github/scripts/setup-slang.sh --resolve-only
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Restore Zig tool cache
        id: zig-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ steps.zig.outputs.version }}-${{ steps.zig.outputs.target }}-${{ matrix.cache }}

      - name: Restore Slang tool cache
        id: slang-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/slang
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ steps.slang.outputs.version }}-${{ steps.slang.outputs.platform }}-${{ matrix.cache }}

      - name: Cache Zig global packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/zig
          key: zig-global-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon') }}-${{ matrix.cache }}
          restore-keys: zig-global-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Zig local build artifacts
        uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-local-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon', 'build.zig', 'src/**', 'shaders/**', 'tools/**') }}-${{ matrix.cache }}
          restore-keys: zig-local-test-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Zig
        run: .github/scripts/setup-zig.sh
        env:
          ZIG_VERSION: ${{ steps.zig.outputs.version }}
          ZIG_DOWNLOAD_URL: ${{ steps.zig.outputs.url }}

      - name: Setup Slang
        run: .github/scripts/setup-slang.sh
        env:
          SLANG_VERSION: ${{ steps.slang.outputs.version }}
          SLANG_DOWNLOAD_URL: ${{ steps.slang.outputs.url }}

      - name: Save Zig tool cache
        if: steps.zig-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ steps.zig.outputs.version }}-${{ steps.zig.outputs.target }}-${{ matrix.cache }}

      - name: Save Slang tool cache
        if: steps.slang-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/slang
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ steps.slang.outputs.version }}-${{ steps.slang.outputs.platform }}-${{ matrix.cache }}

      - name: Verify tools
        run: |
          zig version
          slangc -v

      - name: Run tests
        run: ${{ matrix.command }}

  build:
    name: ReleaseFast (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: [lint, test]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_release_build }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu core
            cache: ubuntu-core
            os: ubuntu-latest
            command: zig build -Doptimize=ReleaseFast
          - name: ubuntu vulkan
            cache: ubuntu-vulkan
            os: ubuntu-latest
            command: zig build -Doptimize=ReleaseFast -Dvulkan=true
          - name: macos core
            cache: macos-core
            os: macos-26
            command: zig build -Doptimize=ReleaseFast
          - name: macos metal
            cache: macos-metal
            os: macos-26
            command: zig build -Doptimize=ReleaseFast -Dmetal=true
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Zig
        id: zig
        run: .github/scripts/setup-zig.sh --resolve-only

      - name: Resolve Slang
        id: slang
        run: .github/scripts/setup-slang.sh --resolve-only
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Restore Zig tool cache
        id: zig-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ steps.zig.outputs.version }}-${{ steps.zig.outputs.target }}-${{ matrix.cache }}-release

      - name: Restore Slang tool cache
        id: slang-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/slang
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ steps.slang.outputs.version }}-${{ steps.slang.outputs.platform }}-${{ matrix.cache }}-release

      - name: Cache Zig global packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/zig
          key: zig-global-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon') }}-${{ matrix.cache }}-release
          restore-keys: zig-global-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Zig local build artifacts
        uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-local-release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon', 'build.zig', 'src/**', 'shaders/**', 'tools/**') }}-${{ matrix.cache }}
          restore-keys: zig-local-release-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Zig
        run: .github/scripts/setup-zig.sh
        env:
          ZIG_VERSION: ${{ steps.zig.outputs.version }}
          ZIG_DOWNLOAD_URL: ${{ steps.zig.outputs.url }}

      - name: Setup Slang
        run: .github/scripts/setup-slang.sh
        env:
          SLANG_VERSION: ${{ steps.slang.outputs.version }}
          SLANG_DOWNLOAD_URL: ${{ steps.slang.outputs.url }}

      - name: Save Zig tool cache
        if: steps.zig-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ steps.zig.outputs.version }}-${{ steps.zig.outputs.target }}-${{ matrix.cache }}-release

      - name: Save Slang tool cache
        if: steps.slang-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/slang
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ steps.slang.outputs.version }}-${{ steps.slang.outputs.platform }}-${{ matrix.cache }}-release

      - name: Verify tools
        run: |
          zig version
          slangc -v

      - name: Build release
        run: ${{ matrix.command }}
