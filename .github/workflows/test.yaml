name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      zig_version:
        description: "Zig version: from-zon, stable/latest, master, or an explicit version"
        required: false
        default: "from-zon"
        type: string
      slang_version:
        description: "Slang release: latest or an explicit version/tag"
        required: false
        default: "latest"
        type: string

permissions:
  contents: read

env:
  ZIG_VERSION: ${{ inputs.zig_version || 'from-zon' }}
  SLANG_VERSION: ${{ inputs.slang_version || 'latest' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Zig
        id: zig
        run: ./.github/scripts/setup-zig.sh --resolve-only

      - name: Restore Zig tool cache
        id: zig-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.zig.outputs.install_dir }}
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ steps.zig.outputs.version }}-${{ steps.zig.outputs.target }}-lint

      - name: Setup Zig
        run: ./.github/scripts/setup-zig.sh
        env:
          ZIG_VERSION: ${{ steps.zig.outputs.version }}
          ZIG_DOWNLOAD_URL: ${{ steps.zig.outputs.url }}

      - name: Save Zig tool cache
        if: steps.zig-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.zig.outputs.install_dir }}
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ steps.zig.outputs.version }}-${{ steps.zig.outputs.target }}-lint

      - name: Check formatting
        run: zig fmt --check build.zig build/ src/ tools/

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu core
            os: ubuntu-latest
            cache: ubuntu-core
            setup_zig: ./.github/scripts/setup-zig.sh
            setup_slang: ./.github/scripts/setup-slang.sh
            command: zig build test
            slang: false
            wayland: false
            windows: false
          - name: ubuntu vulkan
            os: ubuntu-latest
            cache: ubuntu-vulkan
            setup_zig: ./.github/scripts/setup-zig.sh
            setup_slang: ./.github/scripts/setup-slang.sh
            command: zig build test -Dvulkan=true
            slang: true
            wayland: false
            windows: false
          - name: ubuntu vulkan shader stats
            os: ubuntu-latest
            cache: ubuntu-vulkan-shader-stats
            setup_zig: ./.github/scripts/setup-zig.sh
            setup_slang: ./.github/scripts/setup-slang.sh
            command: zig build test -Dvulkan=true -Dshader-stats=true
            slang: true
            wayland: false
            windows: false
          - name: ubuntu vulkan demo
            os: ubuntu-latest
            cache: ubuntu-vulkan-demo
            setup_zig: ./.github/scripts/setup-zig.sh
            setup_slang: ./.github/scripts/setup-slang.sh
            command: zig build test -Ddemo=true -Ddemo-backend=vulkan
            slang: true
            wayland: true
            windows: false
          - name: macos core
            os: macos-26
            cache: macos-core
            setup_zig: ./.github/scripts/setup-zig.sh
            setup_slang: ./.github/scripts/setup-slang.sh
            command: zig build test
            slang: false
            wayland: false
            windows: false
          - name: macos metal
            os: macos-26
            cache: macos-metal
            setup_zig: ./.github/scripts/setup-zig.sh
            setup_slang: ./.github/scripts/setup-slang.sh
            command: zig build test -Dmetal=true
            slang: true
            wayland: false
            windows: false
          - name: macos metal shader stats
            os: macos-26
            cache: macos-metal-shader-stats
            setup_zig: ./.github/scripts/setup-zig.sh
            setup_slang: ./.github/scripts/setup-slang.sh
            command: zig build test -Dmetal=true -Dshader-stats=true
            slang: true
            wayland: false
            windows: false
          - name: macos metal demo
            os: macos-26
            cache: macos-metal-demo
            setup_zig: ./.github/scripts/setup-zig.sh
            setup_slang: ./.github/scripts/setup-slang.sh
            command: zig build test -Ddemo=true -Ddemo-backend=metal
            slang: true
            wayland: false
            windows: false
          - name: windows-2025-vs2026 core
            os: windows-2025-vs2026
            cache: windows-2025-vs2026-core
            setup_zig: ./.github/scripts/setup-zig.ps1
            setup_slang: ./.github/scripts/setup-slang.ps1
            command: zig build test
            slang: false
            wayland: false
            windows: true
          - name: windows-2025-vs2026 vulkan
            os: windows-2025-vs2026
            cache: windows-2025-vs2026-vulkan
            setup_zig: ./.github/scripts/setup-zig.ps1
            setup_slang: ./.github/scripts/setup-slang.ps1
            command: zig build test -Dvulkan=true
            slang: true
            wayland: false
            windows: true
          - name: windows-2025-vs2026 vulkan shader stats
            os: windows-2025-vs2026
            cache: windows-2025-vs2026-vulkan-shader-stats
            setup_zig: ./.github/scripts/setup-zig.ps1
            setup_slang: ./.github/scripts/setup-slang.ps1
            command: zig build test -Dvulkan=true -Dshader-stats=true
            slang: true
            wayland: false
            windows: true
          - name: windows-2025-vs2026 vulkan demo
            os: windows-2025-vs2026
            cache: windows-2025-vs2026-vulkan-demo
            setup_zig: ./.github/scripts/setup-zig.ps1
            setup_slang: ./.github/scripts/setup-slang.ps1
            command: zig build test -Ddemo=true -Ddemo-backend=vulkan
            slang: true
            wayland: false
            windows: true
    steps:
      - uses: actions/checkout@v6

      - name: Prepare Windows CI paths
        if: ${{ matrix.windows }}
        id: windows-ci
        run: ./.github/scripts/prepare-windows-ci.ps1 -CacheName ${{ matrix.cache }}

      - name: Resolve Zig
        id: zig
        run: ${{ matrix.setup_zig }} --resolve-only

      - name: Resolve Slang
        if: ${{ matrix.slang }}
        id: slang
        run: ${{ matrix.setup_slang }} --resolve-only
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Restore Zig tool cache
        id: zig-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.zig.outputs.install_dir }}
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ steps.zig.outputs.version }}-${{ steps.zig.outputs.target }}-${{ matrix.cache }}

      - name: Restore Slang tool cache
        if: ${{ matrix.slang }}
        id: slang-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.slang.outputs.install_dir }}
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ steps.slang.outputs.version }}-${{ steps.slang.outputs.platform }}-${{ matrix.cache }}

      - name: Cache Zig global packages
        if: ${{ !matrix.windows }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/zig
          key: zig-global-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon') }}-${{ matrix.cache }}
          restore-keys: zig-global-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Zig global packages (Windows)
        if: ${{ matrix.windows }}
        uses: actions/cache@v5
        with:
          path: ${{ steps.windows-ci.outputs.zig_global_cache_dir }}
          key: zig-global-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon') }}-${{ matrix.cache }}
          restore-keys: zig-global-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Zig local build artifacts
        if: ${{ !matrix.windows }}
        uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-local-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon', 'build.zig', 'src/**', 'shaders/**', 'tools/**') }}-${{ matrix.cache }}
          restore-keys: zig-local-test-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Zig local build artifacts (Windows)
        if: ${{ matrix.windows }}
        uses: actions/cache@v5
        with:
          path: ${{ steps.windows-ci.outputs.zig_local_cache_dir }}
          key: zig-local-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon', 'build.zig', 'src/**', 'shaders/**', 'tools/**') }}-${{ matrix.cache }}
          restore-keys: zig-local-test-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Wayland demo packages
        if: ${{ matrix.wayland }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-bin libwayland-dev libxkbcommon-dev wayland-protocols

      - name: Setup Zig
        run: ${{ matrix.setup_zig }}
        env:
          ZIG_VERSION: ${{ steps.zig.outputs.version }}
          ZIG_DOWNLOAD_URL: ${{ steps.zig.outputs.url }}

      - name: Fetch Zig dependencies (Windows retry)
        if: ${{ matrix.windows }}
        run: ./.github/scripts/fetch-zig-deps-windows.ps1 -Command "${{ matrix.command }} --fetch=needed"

      - name: Setup Slang
        if: ${{ matrix.slang }}
        run: ${{ matrix.setup_slang }}
        env:
          SLANG_VERSION: ${{ steps.slang.outputs.version }}
          SLANG_DOWNLOAD_URL: ${{ steps.slang.outputs.url }}

      - name: Save Zig tool cache
        if: steps.zig-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.zig.outputs.install_dir }}
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ steps.zig.outputs.version }}-${{ steps.zig.outputs.target }}-${{ matrix.cache }}

      - name: Save Slang tool cache
        if: ${{ matrix.slang && steps.slang-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.slang.outputs.install_dir }}
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ steps.slang.outputs.version }}-${{ steps.slang.outputs.platform }}-${{ matrix.cache }}

      - name: Verify Zig
        run: zig version

      - name: Verify Slang
        if: ${{ matrix.slang }}
        run: slangc -v

      - name: Run tests
        run: ${{ matrix.command }}
