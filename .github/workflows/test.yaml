name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      zig_version:
        description: "Zig version: from-zon, stable/latest, master, or an explicit version"
        required: false
        default: "from-zon"
        type: string
      slang_version:
        description: "Slang release: latest or an explicit version/tag"
        required: false
        default: "latest"
        type: string
      run_release_build:
        description: "Run the ReleaseFast build job"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  ZIG_TARGET: x86_64-linux
  SLANG_ASSET_PATTERN: linux-x86_64\.tar\.gz$

jobs:
  resolve-tools:
    name: Resolve tool versions
    runs-on: ubuntu-latest
    outputs:
      zig_version: ${{ steps.zig.outputs.version }}
      zig_url: ${{ steps.zig.outputs.url }}
      slang_version: ${{ steps.slang.outputs.version }}
      slang_url: ${{ steps.slang.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Zig
        id: zig
        run: .github/scripts/setup-zig.sh --resolve-only
        env:
          ZIG_VERSION: ${{ inputs.zig_version || 'from-zon' }}

      - name: Resolve Slang
        id: slang
        run: .github/scripts/setup-slang.sh --resolve-only
        env:
          SLANG_VERSION: ${{ inputs.slang_version || 'latest' }}
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          echo "Zig: ${{ steps.zig.outputs.version }}"
          echo "Slang: ${{ steps.slang.outputs.version }}"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: resolve-tools
    steps:
      - uses: actions/checkout@v6

      - name: Restore Zig tool cache
        id: zig-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ needs.resolve-tools.outputs.zig_version }}

      - name: Setup Zig
        run: .github/scripts/setup-zig.sh
        env:
          ZIG_VERSION: ${{ needs.resolve-tools.outputs.zig_version }}
          ZIG_DOWNLOAD_URL: ${{ needs.resolve-tools.outputs.zig_url }}

      - name: Save Zig tool cache
        if: steps.zig-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ needs.resolve-tools.outputs.zig_version }}

      - name: Check formatting
        run: zig fmt --check src/ tools/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: resolve-tools
    steps:
      - uses: actions/checkout@v6

      - name: Restore Zig tool cache
        id: zig-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ needs.resolve-tools.outputs.zig_version }}

      - name: Restore Slang tool cache
        id: slang-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/slang
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ needs.resolve-tools.outputs.slang_version }}

      - name: Cache Zig global packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/zig
          key: zig-global-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-global-${{ runner.os }}-

      - name: Cache Zig local build artifacts
        uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-local-test-${{ runner.os }}-${{ hashFiles('build.zig.zon', 'build.zig', 'src/**', 'shaders/**', 'tools/**') }}
          restore-keys: zig-local-test-${{ runner.os }}-

      - name: Setup Zig
        run: .github/scripts/setup-zig.sh
        env:
          ZIG_VERSION: ${{ needs.resolve-tools.outputs.zig_version }}
          ZIG_DOWNLOAD_URL: ${{ needs.resolve-tools.outputs.zig_url }}

      - name: Setup Slang
        run: .github/scripts/setup-slang.sh
        env:
          SLANG_VERSION: ${{ needs.resolve-tools.outputs.slang_version }}
          SLANG_DOWNLOAD_URL: ${{ needs.resolve-tools.outputs.slang_url }}

      - name: Save Zig tool cache
        if: steps.zig-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ needs.resolve-tools.outputs.zig_version }}

      - name: Save Slang tool cache
        if: steps.slang-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/slang
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ needs.resolve-tools.outputs.slang_version }}

      - name: Verify tools
        run: |
          zig version
          slangc -v

      - name: Test
        run: zig build test

  build:
    name: Build (ReleaseFast)
    runs-on: ubuntu-latest
    needs: [resolve-tools, lint, test]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_release_build }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore Zig tool cache
        id: zig-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ needs.resolve-tools.outputs.zig_version }}

      - name: Restore Slang tool cache
        id: slang-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/slang
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ needs.resolve-tools.outputs.slang_version }}

      - name: Cache Zig global packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/zig
          key: zig-global-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-global-${{ runner.os }}-

      - name: Cache Zig local build artifacts
        uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-local-build-${{ runner.os }}-${{ hashFiles('build.zig.zon', 'build.zig', 'src/**', 'shaders/**', 'tools/**') }}
          restore-keys: zig-local-build-${{ runner.os }}-

      - name: Setup Zig
        run: .github/scripts/setup-zig.sh
        env:
          ZIG_VERSION: ${{ needs.resolve-tools.outputs.zig_version }}
          ZIG_DOWNLOAD_URL: ${{ needs.resolve-tools.outputs.zig_url }}

      - name: Setup Slang
        run: .github/scripts/setup-slang.sh
        env:
          SLANG_VERSION: ${{ needs.resolve-tools.outputs.slang_version }}
          SLANG_DOWNLOAD_URL: ${{ needs.resolve-tools.outputs.slang_url }}

      - name: Save Zig tool cache
        if: steps.zig-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ needs.resolve-tools.outputs.zig_version }}

      - name: Save Slang tool cache
        if: steps.slang-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/slang
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ needs.resolve-tools.outputs.slang_version }}

      - name: Verify tools
        run: |
          zig version
          slangc -v

      - name: Build
        run: zig build -Doptimize=ReleaseFast
