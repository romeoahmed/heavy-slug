name: Reusable Core

"on":
  workflow_call:
    inputs:
      zig_version:
        required: false
        default: from-zon
        type: string

permissions:
  contents: read

jobs:
  core:
    name: Core (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-24.04
          - name: macOS
            os: macos-26
          - name: Windows
            os: windows-2025-vs2026
    steps:
      - name: Enable Git long paths before checkout
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Enable Windows long paths
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: ./.github/scripts/enable-windows-long-paths.ps1

      - name: Setup Zig
        id: zig
        uses: ./.github/actions/setup-zig
        with:
          version: ${{ inputs.zig_version }}

      - name: Fetch Zig dependencies
        uses: ./.github/actions/fetch-zig-deps
        with:
          build-args: test

      - name: Run core tests
        run: zig build test

      - name: Save Zig package cache
        uses: ./.github/actions/save-zig-package-cache
        with:
          cache-hit: ${{ steps.zig.outputs.package_cache_hit }}
          key: ${{ steps.zig.outputs.package_cache_key }}
          path: ${{ steps.zig.outputs.package_cache_path }}
